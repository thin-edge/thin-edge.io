apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt
spec:
  replicas: 1
  # Never run two mosquitto pods at once: on upgrade Recreate terminates the old
  # pod before starting the new one, avoiding concurrent access to the broker's
  # persistent state (the default RollingUpdate would briefly run both).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
      - name: mosquitto
        image: ghcr.io/thin-edge/tedge-mosquitto:20260528.1607
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 1883
          name: mqtt-svc

---

apiVersion: v1
kind: Service
metadata:
  name: mqtt
spec:
  selector:
    app: mosquitto
  ports:
    - protocol: TCP
      port: {{ .Values.services.mqtt.port }}
      targetPort: mqtt-svc
