[package]
name = "facet-config-runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
facet = { version = "0.50.0-rc.5", features = ["camino", "net", "nonzero"] }
facet-reflect = "0.50.0-rc.5"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
camino = { version = "1", features = ["serde1"] }
thiserror = "2"
