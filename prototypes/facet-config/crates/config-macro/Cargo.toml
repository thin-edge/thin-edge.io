[package]
name = "facet-config-macro"
version = "0.1.0"
edition = "2021"

[lib]
proc-macro = true

[dependencies]
facet-config-macro-impl = { path = "../config-macro-impl" }

[dev-dependencies]
facet-config-runtime = { path = "../config-runtime" }
facet = { version = "0.50.0-rc.5", features = ["camino", "net", "nonzero"] }
serde = { version = "1", features = ["derive"] }
