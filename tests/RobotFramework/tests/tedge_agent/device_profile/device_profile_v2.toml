operation = "device_profile_v2"

[init]
action = "proceed"
on_success = "scheduled"

# Sort the inputs as desired
[scheduled]
action = "proceed"
on_success = "executing"
on_error = { status = "failed", reason = "fail to sort the profile list"}

[executing]
action = "proceed"
on_success = "next_operation"

[next_operation]
script = "python3 /etc/tedge/operations/iterator.py ${.payload}"
on_stdout = ["apply_operation", "successful", "rollback"]

[apply_operation]
operation = "${.payload.@next.operation.operation}"
input_script = "/etc/tedge/operations/extract_next.sh ${.payload}"
on_exec = "awaiting_operation"

[awaiting_operation]
action = "await-operation-completion"
on_success = "next_operation"
on_error = "rollback"

[rollback]
action="proceed"
on_success = { status = "failed", reason = "Device profile application failed" }
on_error = { status = "failed", reason = "Rollback failed" }

[successful]
action = "cleanup"

[failed]
action = "cleanup"
