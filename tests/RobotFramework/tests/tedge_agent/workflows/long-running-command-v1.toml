operation = "long-running-command"

[init]
action = "proceed"
on_success = "executing"

[executing]
script = "sleep ${.payload.duration}"
on_success = "logging"
on_error = "logging"

[logging]
script = "/etc/tedge/operations/echo-as-json.sh long-running-command first-version"
on_success = "successful"

[successful]
action = "cleanup"

[failed]
action = "cleanup"
